<section class="bill-form">
    {% if edit_bill %}
        <h2>Edit Bill</h2>
        <form method="post" action="{{ url_for('bills.edit_bill', bill_id=edit_bill.bill_id) }}">
    {% else %}
        <h2>Add New Bill</h2>
        <form method="post" action="{{ url_for('bills.add_bill') }}">
    {% endif %}
        <div>
            <label for="bill-title">Title</label>
            <input id="bill-title" name="title" type="text" required value="{{ edit_bill.title if edit_bill else '' }}">
        </div>
        <div>
            <label for="bill-amount">Amount</label>
            <input id="bill-amount" name="amount" type="number" step="0.01" required value="{{ edit_bill.amount if edit_bill else '' }}">
        </div>
        <div>
            <label for="day-due">Day Due</label>
            <input id="day-due" name="day_due" type="date" required value="{{ edit_bill.day_due if edit_bill else '' }}">
        </div>
        <div>
            <label for="is-recurring">
                <input id="is-recurring" name="is_recurring" type="checkbox" {% if edit_bill and edit_bill.is_recurring %}checked{% endif %}>
                Is Recurring?
            </label>
        </div>
        <button type="submit">{% if edit_bill %}Update Bill{% else %}Add Bill{% endif %}</button>
        {% if edit_bill %}
            <a href="{{ url_for('expenses.expenses_view') }}">Cancel</a>
        {% endif %}
    </form>
</section>
