<section class="expense-form">
    {% if edit_expense %}
        <h2>Edit Expense</h2>
        <form method="post" action="{{ url_for('expenses.edit_expense', expense_id=edit_expense.ex_id) }}">
    {% else %}
        <h2>Add New Expense</h2>
        <form method="post" action="{{ url_for('expenses.add_expense') }}">
    {% endif %}
        <div>
            <label for="description">Description</label>
            <input id="description" name="description" type="text" required value="{{ edit_expense.description if edit_expense else '' }}">
        </div>
        <div>
            <label for="amount">Amount</label>
            <input id="amount" name="amount" type="number" step="0.01" required value="{{ edit_expense.amount if edit_expense else '' }}">
        </div>
        <div>
            <label for="date">Date</label>
            <input id="date" name="date" type="date" required value="{{ edit_expense.date if edit_expense else '' }}">
        </div>
        <button type="submit">{% if edit_expense %}Update Expense{% else %}Add Expense{% endif %}</button>
        {% if edit_expense %}
            <a href="{{ url_for('expenses.expenses_view') }}">Cancel</a>
        {% endif %}
    </form>
</section>
